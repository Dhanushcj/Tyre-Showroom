<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Sri Dhanalakshmi Enterprises</title>
    <link rel="icon" type="image/webp" href="logo.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        admin: {
                            500: '#3b82f6', // blue-500
                            600: '#2563eb', // blue-600
                            900: '#1e3a8a', // blue-900
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .grid-pattern {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-300 antialiased min-h-screen flex items-center justify-center selection:bg-admin-500 selection:text-white relative overflow-hidden">
    
    <!-- Background Grid & Glows -->
    <div class="absolute inset-0 grid-pattern"></div>
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-admin-900/40 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-slate-800/40 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md px-4 relative z-10">
        
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full overflow-hidden border border-slate-700 shadow-lg mb-6 shadow-admin-500/20">
                <img src="logo.webp" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Admin Portal</h2>
            <p class="text-slate-500 text-sm">Secure access to showroom management.</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-2xl p-8 shadow-2xl">
            <div id="login-error" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm font-bold text-center">Invalid Request.</div>
            <form id="login-form" class="space-y-6">
                
                <!-- Email/Username -->
                <div>
                    <label for="admin-id" class="block text-sm font-medium text-slate-400 mb-2 uppercase tracking-wider text-xs">Admin ID / Email</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-admin-500 transition-colors">
                            <i class="fa-solid fa-user-shield"></i>
                        </div>
                        <input type="text" id="admin-id" name="username" class="block w-full pl-10 pr-3 py-3 border border-slate-800 rounded-xl bg-slate-950/50 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-admin-500/50 focus:border-admin-500 transition-all" placeholder="admin" required>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="admin-password" class="block text-sm font-medium text-slate-400 mb-2 uppercase tracking-wider text-xs">Security Key</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-admin-500 transition-colors">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        <input type="password" id="admin-password" name="password" class="block w-full pl-10 pr-10 py-3 border border-slate-800 rounded-xl bg-slate-950/50 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-admin-500/50 focus:border-admin-500 transition-all font-mono" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Actions -->
                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-admin-600 hover:bg-admin-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-admin-500 transition-all shadow-admin-500/20 group">
                        <i class="fa-solid fa-unlock-keyhole mr-2 opacity-70 group-hover:opacity-100 transition-opacity"></i>
                        Authenticate Session
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-8 text-center text-xs text-slate-600">
            <p>Protected by Advanced Encryption Standard (AES-256).</p>
            <p class="mt-1"><a href="index.html" class="hover:text-slate-400 transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Return to Main Site</a></p>
        </div>

    </div>

    <script src="auth.js"></script>
</body>
</html>
